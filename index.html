#app { display: flex; flex-direction: column; height: 100dvh; height: 100vh; overflow: hidden; }

/* HEADER */
#header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px 10px; flex-shrink: 0;
  border-bottom: 1px solid #1e293b; background: #0a0f1e;
}
#header-icon {
  width: 36px; height: 36px; border-radius: 9px; flex-shrink: 0;
  background: linear-gradient(135deg, #3b82f6, #1d4ed8);
  display: flex; align-items: center; justify-content: center; font-size: 18px;
}
#header-title { font-size: 16px; font-weight: 700; }
#header-title span { color: #3b82f6; font-size: 14px; }
#header-sub { font-size: 11px; color: #475569; margin-top: 1px; }

/* CHIPS */
#chips {
  display: flex; gap: 6px; padding: 8px 12px; overflow-x: auto;
  flex-shrink: 0; border-bottom: 1px solid #0f172a; background: #0a0f1e;
}
#chips::-webkit-scrollbar { display: none; }
.chip {
  padding: 6px 14px; border-radius: 20px; border: 1px solid #1e293b;
  background: #0f172a; color: #64748b; font-size: 12px; font-weight: 500;
  cursor: pointer; white-space: nowrap; font-family: inherit; flex-shrink: 0;
  transition: background 0.15s, color 0.15s;
}
.chip.active { background: #1d4ed8; border-color: #3b82f6; color: #fff; }

/* CONTENT */
#content { flex: 1; overflow: hidden; position: relative; min-height: 0; }

/* MAP */
#map-tab { width: 100%; height: 100%; position: relative; }
#map-svg { display: block; width: 100%; height: 100%; }
.arc { transition: stroke-opacity 0.2s; }
.dot-group { cursor: pointer; }
#tap-hint {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(10,15,30,0.9); border: 1px solid #1e293b; border-radius: 20px;
  padding: 7px 16px; font-size: 12px; color: #64748b; white-space: nowrap;
  pointer-events: none;
}

/* LIST */
#list-tab { display: flex; flex-direction: column; height: 100%; }
#search-wrap { padding: 10px 14px; border-bottom: 1px solid #0f172a; flex-shrink: 0; position: relative; }
#search-icon { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); font-size: 14px; color: #475569; pointer-events: none; }
#search {
  width: 100%; background: #0f172a; border: 1px solid #1e293b; border-radius: 10px;
  padding: 10px 12px 10px 34px; color: #e2e8f0; font-size: 15px;
  font-family: inherit; outline: none;
}
#list-count { padding: 8px 16px 4px; font-size: 11px; color: #334155; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
#list-scroll { flex: 1; overflow-y: auto; }
.dest-row {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px; border-bottom: 1px solid #0f172a; cursor: pointer;
}
.dest-row.sel { background: #0f2040; border-left: 3px solid #3b82f6; }
.dest-flag { font-size: 22px; flex-shrink: 0; }
.dest-name { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dest-sub { font-size: 12px; color: #64748b; margin-top: 1px; }
.dest-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.dest-iata { font-size: 11px; font-weight: 700; color: #475569; font-family: 'DM Mono', monospace; }
.dest-dot { width: 8px; height: 8px; border-radius: 50%; }

/* BOTTOM NAV */
#bottom-nav {
  display: flex; border-top: 1px solid #1e293b; background: #0a0f1e; flex-shrink: 0;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.tab-btn {
  flex: 1; background: none; border: none; color: #475569;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 8px 16px; cursor: pointer; font-family: inherit;
  font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
}
.tab-btn.active { color: #3b82f6; }
.tab-btn svg { display: block; }

/* SHEET */
#backdrop {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 40;
}
#sheet {
  display: none; position: fixed; left: 0; right: 0; bottom: 0; z-index: 50;
  background: #0f172a; border-radius: 20px 20px 0 0; border-top: 1px solid #1e293b;
  max-height: 82vh; overflow-y: auto;
  padding-bottom: env(safe-area-inset-bottom, 16px);
}
#backdrop.open, #sheet.open { display: block; animation: fadeIn 0.2s; }
#sheet.open { animation: slideUp 0.28s cubic-bezier(0.32,0.72,0,1); }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

#sheet-handle { display: flex; justify-content: center; padding: 12px 0 4px; }
#sheet-handle-bar { width: 36px; height: 4px; border-radius: 2px; background: #334155; }
#sheet-top { display: flex; align-items: flex-start; justify-content: space-between; padding: 6px 18px 12px; }
#sheet-close {
  background: #1e293b; border: none; border-radius: 8px; width: 32px; height: 32px;
  color: #94a3b8; font-size: 16px; cursor: pointer; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
}
#sheet-body { padding: 0 14px 20px; display: flex; flex-direction: column; gap: 10px; }
.s-card { background: #0a0f1e; border-radius: 12px; padding: 12px 14px; border: 1px solid #1e293b; }
.s-label { font-size: 10px; color: #475569; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }
.s-value { font-size: 13px; font-weight: 500; line-height: 1.4; }
.s-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.days-row { display: flex; gap: 6px; margin-top: 8px; }
.day-pill { flex: 1; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
.times-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.time-card { border-radius: 10px; padding: 8px 14px; text-align: center; }
.time-val { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; }
.time-sub { font-size: 10px; color: #475569; margin-top: 2px; }
.s-note { margin-top: 10px; font-size: 11px; color: #475569; font-style: italic; }

@keyframes pulseO { 0%,100% { opacity: 0.2; } 50% { opacity: 0.06; } }
.pulse { animation: pulseO 2.2s ease-in-out infinite; }

.hidden { display: none !important; }

function project(lat, lng) {
  var x = ((lng + 180) / 360) * W;
  var latRad = lat * Math.PI / 180;
  var mercN = Math.log(Math.tan(Math.PI / 4 + latRad / 2));
  var y = H / 2 - (W * mercN) / (2 * Math.PI);
  return { x: x, y: y };
}

function getActiveDays(dest) {
  var seed = dest.iata.charCodeAt(0) + dest.iata.charCodeAt(1);
  var f = dest.freq.toLowerCase();
  var count = f.indexOf("daily") >= 0 ? 7 : f.indexOf("5x") >= 0 ? 5 : f.indexOf("4x") >= 0 ? 4 : f.indexOf("3x") >= 0 ? 3 : f.indexOf("2x") >= 0 ? 2 : 1;
  var seen = {}, days = [];
  for (var i = 0; i < count; i++) {
    var d = DAYS[(seed + i * 2) % 7];
    if (!seen[d]) { seen[d] = true; days.push(d); }
  }
  return days.sort(function(a, b) { return DAYS.indexOf(a) - DAYS.indexOf(b); });
}

function svgEl(tag, attrs) {
  var el = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (var k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

function el(tag, attrs, html) {
  var e = document.createElement(tag);
  if (attrs) { for (var k in attrs) { if (k === "class") e.className = attrs[k]; else e[k] = attrs[k]; } }
  if (html !== undefined) e.innerHTML = html;
  return e;
}

}

    g.appendChild(svgEl("ellipse", { cx: b[0], cy: b[1], rx: b[2], ry: b[3] }));

    var p = project(lat, 0);
    svg.appendChild(svgEl("line", { x1:0, y1:p.y, x2:W, y2:p.y, stroke:"#1e293b", "stroke-width":"0.4" }));
  });
  [-150,-120,-90,-60,-30,0,30,60,90,120,150].forEach(function(lng) {
    var p = project(0, lng);
    svg.appendChild(svgEl("line", { x1:p.x, y1:0, x2:p.x, y2:H, stroke:"#1e293b", "stroke-width":"0.4" }));

    var mx = (nue.x + dp.x) / 2, my = (nue.y + dp.y) / 2 - 38;
    var path = svgEl("path", {

      fill: "none", stroke: color,
      "stroke-width": isSel ? "2" : "0.8",
      "stroke-opacity": isSel ? "1" : "0.3",
      "stroke-dasharray": isSel ? "none" : "5 4"
    });
    svg.appendChild(path);
  });

  // Dots
  filtered.forEach(function(d) {
    var dp = project(d.lat, d.lng);
    var isSel = selectedIata === d.iata;
    var color = REGION_COLORS[d.region] || "#94a3b8";

    var g = svgEl("g", { cursor: "pointer" });

    if (isSel) {
      var glow = svgEl("circle", { cx: dp.x, cy: dp.y, r: "12", fill: color, opacity: "0.15" });
      glow.style.animation = "pulseO 2.2s ease-in-out infinite";
      g.appendChild(glow);
    }

    g.appendChild(svgEl("circle", { cx: dp.x, cy: dp.y, r: "16", fill: "transparent" })); // tap target
    g.appendChild(svgEl("circle", { cx: dp.x, cy: dp.y, r: isSel ? "6" : "4", fill: color, opacity: isSel ? "1" : "0.85" }));
    g.appendChild(svgEl("circle", { cx: dp.x, cy: dp.y, r: isSel ? "6" : "4", fill: "none", stroke: color, "stroke-width": "1.5", opacity: "0.5" }));

    if (isSel) {
      var lbl = svgEl("text", { x: dp.x, y: dp.y - 11, "text-anchor": "middle", fill: color, "font-size": "9", "font-weight": "700", "font-family": "DM Sans, sans-serif" });
      lbl.textContent = d.city;
      g.appendChild(lbl);
    }

    (function(iata) {
      g.addEventListener("click", function() { selectDest(iata); });
    })(d.iata);

    svg.appendChild(g);
  });

  // NUE marker
  var nueGlow = svgEl("circle", { cx: nue.x, cy: nue.y, r: "10", fill: "#3b82f6", opacity: "0.2" });
  nueGlow.style.animation = "pulseO 2.2s ease-in-out infinite";
  svg.appendChild(nueGlow);
  svg.appendChild(svgEl("circle", { cx: nue.x, cy: nue.y, r: "6", fill: "#3b82f6" }));
  svg.appendChild(svgEl("circle", { cx: nue.x, cy: nue.y, r: "6", fill: "none", stroke: "#93c5fd", "stroke-width": "2" }));
  var nueLbl = svgEl("text", { x: nue.x, y: nue.y - 11, "text-anchor": "middle", fill: "#93c5fd", "font-size": "9", "font-weight": "700", "font-family": "DM Sans, sans-serif" });
  nueLbl.textContent = "NUE";
  svg.appendChild(nueLbl);

  document.getElementById("tap-hint").style.display = selectedIata ? "none" : "block";
}

// BUILD LIST
function buildList() {
  var filtered = getFiltered();
  var search = document.getElementById("search").value;
  if (search) {
    var q = search.toLowerCase();
    filtered = filtered.filter(function(d) {
      return d.city.toLowerCase().indexOf(q) >= 0 || d.country.toLowerCase().indexOf(q) >= 0 || d.iata.toLowerCase().indexOf(q) >= 0;
    });
  }
  document.getElementById("list-count").textContent = filtered.length + " destinations";
  var scroll = document.getElementById("list-scroll");
  scroll.innerHTML = "";
  filtered.forEach(function(d) {
    var row = el("div", { class: "dest-row" + (selectedIata === d.iata ? " sel" : "") });
    var color = REGION_COLORS[d.region] || "#94a3b8";
    row.innerHTML =
      '<span class="dest-flag">' + d.flag + '</span>' +
      '<div style="flex:1;min-width:0"><div class="dest-name">' + d.city + '</div><div class="dest-sub">' + d.country + ' &middot; ' + d.airline.split("/")[0].trim() + '</div></div>' +
      '<div class="dest-right"><div class="dest-iata">' + d.iata + '</div><div class="dest-dot" style="background:' + color + '"></div></div>';
    (function(iata) {
      row.addEventListener("click", function() { selectDest(iata); });
    })(d.iata);
    scroll.appendChild(row);
  });
}

function getFiltered() {
  return DESTINATIONS.filter(function(d) {
    return activeRegion === "All" || d.region === activeRegion;
  });
}

function selectDest(iata) {
  selectedIata = selectedIata === iata ? null : iata;
  buildMap();
  buildList();
  if (selectedIata) openSheet(selectedIata);
  else closeSheet();
}

function openSheet(iata) {
  var dest = DESTINATIONS.find(function(d) { return d.iata === iata; });
  if (!dest) return;
  var color = REGION_COLORS[dest.region] || "#94a3b8";

  document.getElementById("sheet-info").innerHTML =
    '<div style="display:flex;align-items:center;gap:10px">' +
      '<span style="font-size:28px">' + dest.flag + '</span>' +
      '<div>' +
        '<div style="font-size:20px;font-weight:700">' + dest.city + '</div>' +
        '<div style="font-size:13px;color:#64748b">' + dest.country + ' &middot; ' + dest.iata + '</div>' +
      '</div>' +
    '</div>' +
    '<div style="margin-top:8px"><span style="padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:' + color + '22;color:' + color + ';border:1px solid ' + color + '44">' + dest.region + '</span></div>';

  var activeDays = getActiveDays(dest);
  var dayPillsHTML = DAYS.map(function(day) {
    var on = activeDays.indexOf(day) >= 0;
    var bg = on ? color + "22" : "#1e293b";
    var clr = on ? color : "#334155";
    var bdr = on ? color + "55" : "transparent";
    return '<div class="day-pill" style="background:' + bg + ';color:' + clr + ';border:1px solid ' + bdr + '">' + day.slice(0,2) + '</div>';
  }).join("");

  var timeCardsHTML = dest.times.map(function(t) {
    return '<div class="time-card" style="background:' + color + '18;border:1px solid ' + color + '33"><div class="time-val" style="color:' + color + '">' + t + '</div><div class="time-sub">dep.</div></div>';
  }).join("");

  document.getElementById("sheet-body").innerHTML =
    '<div class="s-grid">' +
      '<div class="s-card"><div class="s-label">Airline(s)</div><div class="s-value">' + dest.airline + '</div></div>' +
      '<div class="s-card"><div class="s-label">Frequency</div><div class="s-value">' + dest.freq + '</div></div>' +
    '</div>' +
    '<div class="s-card"><div class="s-label">Operating Days</div><div class="days-row">' + dayPillsHTML + '</div></div>' +
    '<div class="s-card"><div class="s-label">Typical Departures from NUE</div><div class="times-row">' + timeCardsHTML + '</div><div class="s-note">&#9432; Indicative times &mdash; check airline websites for live schedules.</div></div>';

  document.getElementById("backdrop").className = "open";
  document.getElementById("sheet").className = "open";
}

function closeSheet() {
  selectedIata = null;
  document.getElementById("backdrop").className = "";
  document.getElementById("sheet").className = "";
  buildMap();
  buildList();
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById("map-tab").style.display = tab === "map" ? "block" : "none";
  document.getElementById("list-tab").className = tab === "list" ? "list-wrap" : "list-wrap hidden";
  document.getElementById("btn-map").className = "tab-btn" + (tab === "map" ? " active" : "");
  document.getElementById("btn-list").className = "tab-btn" + (tab === "list" ? " active" : "");
}

document.getElementById("search").addEventListener("input", function() { buildList(); });

// Init
buildChips();
buildMap();
buildList();
</script>
