    const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

    function project(lat, lng, w, h) {
      const x = ((lng + 180) / 360) * w;
      const latRad = (lat * Math.PI) / 180;
      const mercN = Math.log(Math.tan(Math.PI / 4 + latRad / 2));
      const y = h / 2 - (w * mercN) / (2 * Math.PI);
      return { x, y };
    }

    function getDays(dest) {
      const seed = dest.iata.charCodeAt(0) + dest.iata.charCodeAt(1);
      const count = dest.freq.toLowerCase().includes("daily") ? 7
        : dest.freq.includes("5x") ? 5
        : dest.freq.includes("4x") ? 4
        : dest.freq.includes("3x") ? 3
        : dest.freq.includes("2x") ? 2 : 1;
      const days = [];
      for (let i = 0; i < count; i++) days.push(DAYS[(seed + i * 2) % 7]);
      return [...new Set(days)].sort((a, b) => DAYS.indexOf(a) - DAYS.indexOf(b));
    }
